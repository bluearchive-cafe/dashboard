<!DOCTYPE html>
<html lang="zh-CN" class="mdui-theme-auto">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚蓝咖啡厅控制面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <style>
        :root {
            color-scheme: light dark;
            --panel-bg: rgba(255, 255, 255, 0.58);
            --surface-bg: rgba(255, 255, 255, 0.68);
            --surface-border: rgba(255, 255, 255, 0.48);
            --radius-panel: 32px;
            --radius-section: 24px;
            --body-bg: rgb(233, 239, 245);
            --hero-title-color: rgb(15, 23, 42);
            --hero-description-color: rgba(30, 41, 59, 0.78);
            --feature-title-muted: rgba(15, 23, 42, 0.68);
            --footer-color: rgba(15, 23, 42, 0.58);
            --overlay-gradient:
                linear-gradient(135deg, rgba(238, 246, 255, 0.52), rgba(255, 247, 240, 0.42)),
                rgba(255, 255, 255, 0.26);
            --hero-shadow: 0 20px 60px rgba(58, 89, 127, 0.16);
            --item-divider: rgba(148, 163, 184, 0.18);
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            display: grid;
            place-items: center;
            min-height: 100dvh;
            padding: 24px;
            box-sizing: border-box;
            font-family: "Noto Sans", "Noto Sans SC", sans-serif;
            overflow-x: hidden;
            background-color: var(--body-bg);
        }

        .page-background {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .page-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        .page-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: var(--overlay-gradient);
            backdrop-filter: blur(1px);
            pointer-events: none;
        }

        .shell {
            position: relative;
            z-index: 2;
            width: min(1040px, 100%);
            display: grid;
            gap: 18px;
            align-content: center;
        }

        .hero {
            padding: 28px;
            border-radius: var(--radius-panel);
            background: var(--panel-bg);
            backdrop-filter: blur(14px);
            box-shadow: var(--hero-shadow);
        }

        .hero-copy {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .hero-heading {
            display: grid;
            gap: 8px;
        }

        .hero-title {
            margin: 0;
            color: var(--hero-title-color);
        }

        .hero-description {
            margin: 0;
            max-width: 62ch;
            color: var(--hero-description-color);
        }

        .feature-list {
            overflow: hidden;
            border-radius: var(--radius-section);
            background: var(--surface-bg);
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(10px);
        }

        .feature-item {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
        }

        .feature-item + .feature-item {
            border-top: 1px solid var(--item-divider);
        }

        .feature-title {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .feature-title strong {
            font-size: 18px;
        }

        .feature-title span {
            color: var(--feature-title-muted);
            font-size: 13px;
        }

        .feature-status {
            justify-self: start;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .actions mdui-button {
            flex: 1 1 220px;
        }

        .page-footer {
            justify-self: center;
            padding: 2px 12px 0;
            font-size: 12px;
            line-height: 1.6;
            color: var(--footer-color);
            text-align: center;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --panel-bg: rgba(10, 18, 31, 0.72);
                --surface-bg: rgba(16, 27, 45, 0.78);
                --surface-border: rgba(125, 161, 206, 0.22);
                --body-bg: rgb(7, 12, 22);
                --hero-title-color: rgb(233, 242, 255);
                --hero-description-color: rgba(214, 229, 255, 0.8);
                --feature-title-muted: rgba(196, 216, 245, 0.74);
                --footer-color: rgba(191, 210, 238, 0.62);
                --overlay-gradient:
                    linear-gradient(135deg, rgba(7, 23, 46, 0.5), rgba(7, 43, 79, 0.26)),
                    rgba(3, 10, 18, 0.34);
                --hero-shadow: 0 24px 70px rgba(2, 6, 15, 0.5);
                --item-divider: rgba(125, 161, 206, 0.16);
            }
        }

        .status-content,
        .action-content {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .ui-icon {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
            display: inline-block;
            background-color: currentColor;
            mask-position: center;
            mask-repeat: no-repeat;
            mask-size: contain;
            -webkit-mask-position: center;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-size: contain;
        }

        .feature-status .ui-icon {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 880px) {
            body {
                padding: 18px;
            }

            .page-background img {
                object-position: 60% center;
            }

            .feature-item {
                grid-template-columns: minmax(0, 1fr) auto;
            }

            .feature-status {
                grid-column: 1 / 2;
            }

            .feature-item mdui-switch {
                grid-column: 2 / 3;
                grid-row: 1 / 3;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
            }

            .page-background img {
                object-position: 64% center;
            }

            .hero {
                padding: 22px 18px;
                border-radius: 28px;
            }

            .feature-list {
                border-radius: 22px;
            }

            .actions mdui-button {
                flex-basis: 100%;
            }
        }

        @media (max-width: 720px), (max-height: 420px) {
            body {
                padding: 10px;
                place-items: stretch;
            }

            .shell {
                gap: 10px;
                align-content: start;
            }

            .hero {
                padding: 16px 14px;
                border-radius: 24px;
            }

            .hero-copy {
                gap: 8px;
                margin-bottom: 12px;
            }

            .hero-heading {
                gap: 6px;
            }

            .hero-title {
                font-size: 1.45rem;
                line-height: 1.2;
            }

            .hero-description {
                font-size: 13px;
                line-height: 1.5;
            }

            .feature-list {
                border-radius: 18px;
            }

            .feature-item {
                gap: 10px;
                padding: 12px 14px;
            }

            .feature-title strong {
                font-size: 16px;
                line-height: 1.2;
            }

            .feature-title span {
                font-size: 12px;
                line-height: 1.45;
            }

            .actions {
                gap: 10px;
            }

            .actions mdui-button {
                flex: 1 1 calc(50% - 5px);
                min-width: 0;
            }

            .page-footer {
                padding-top: 0;
                font-size: 11px;
                line-height: 1.45;
            }

            mdui-dialog {
                --mdui-shape-corner-extra-large: 18px;
            }

            mdui-dialog::part(panel) {
                width: calc(100vw - 8px);
                max-width: calc(100vw - 8px);
                max-height: calc(100dvh - 8px);
                box-sizing: border-box;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }

            mdui-dialog [slot="headline"] {
                margin: 0;
                font-size: 17px;
                line-height: 1.25;
                word-break: break-word;
            }

            mdui-dialog [slot="description"] {
                margin: 0;
                max-height: none;
                overflow: visible;
                overflow-wrap: anywhere;
                font-size: 13px;
                line-height: 1.55;
                word-break: break-word;
            }

            mdui-dialog [slot="action"] {
                min-width: 72px;
            }

            mdui-dialog::part(body) {
                flex: 1 1 auto;
                min-height: 0;
                overflow: auto;
                overscroll-behavior: contain;
                -webkit-overflow-scrolling: touch;
                padding-bottom: env(safe-area-inset-bottom, 0);
            }

            mdui-dialog::part(action) {
                flex: 0 0 auto;
                padding-top: 4px;
                padding-bottom: 6px;
                gap: 6px;
            }
        }

        @media (max-height: 420px) {
            body {
                overflow-y: auto;
            }

            .hero {
                padding: 14px 12px;
            }

            .feature-item {
                padding: 10px 12px;
            }

            .actions {
                gap: 8px;
            }

            .actions mdui-button {
                flex-basis: calc(50% - 4px);
            }

            mdui-dialog::part(panel) {
                width: calc(100vw - 4px);
                max-width: calc(100vw - 4px);
                max-height: calc(100dvh - 4px);
                display: flex;
                flex-direction: column;
            }

            mdui-dialog {
                --mdui-shape-corner-extra-large: 16px;
            }

            mdui-dialog [slot="headline"] {
                font-size: 16px;
            }

            mdui-dialog [slot="description"] {
                max-height: none;
                font-size: 12px;
                line-height: 1.45;
                overflow: visible;
                scrollbar-gutter: auto;
            }

            mdui-dialog::part(action) {
                flex: 0 0 auto;
                padding-top: 2px;
                padding-bottom: 4px;
                gap: 4px;
            }
        }

        @media (max-height: 260px) {
            mdui-dialog [slot="headline"] {
                font-size: 14px;
                line-height: 1.15;
            }

            mdui-dialog [slot="description"] {
                max-height: none;
                font-size: 11px;
                line-height: 1.35;
                overflow: visible;
            }

            mdui-dialog [slot="action"] {
                min-width: 56px;
                margin: 0;
                --mdui-comp-button-container-height: 32px;
                --mdui-comp-button-label-text-size: 13px;
            }

            mdui-dialog::part(action) {
                padding-top: 0;
                padding-bottom: 0;
                gap: 2px;
            }
        }
    </style>
</head>

<body>
    <div class="page-background" aria-hidden="true">
        <img src="assets/images/background.png" alt="">
    </div>
    <div class="page-overlay" aria-hidden="true"></div>
    <div class="shell">
        <section class="hero mdui-shadow-0">
            <div class="hero-copy">
                <div class="hero-heading">
                    <div class="mdui-typo">
                        <h1 class="mdui-text-color-on-surface hero-title">蔚蓝咖啡厅控制面板</h1>
                        <p class="mdui-text-color-on-surface-variant hero-description">先查看各项状态，再按需切换开关并保存设置。</p>
                    </div>
                </div>
            </div>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-title">
                        <strong>游戏文本</strong>
                        <span>控制文本汉化启用状态</span>
                    </div>
                    <mdui-chip id="text-status" class="feature-status" variant="assist" elevated>
                        <span class="status-content">
                            <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/status-loading.svg');-webkit-mask-image:url('assets/icons/status-loading.svg');"></span>
                            <span class="status-label">加载中</span>
                        </span>
                    </mdui-chip>
                    <mdui-switch id="text-checkbox"></mdui-switch>
                </div>

                <div class="feature-item">
                    <div class="feature-title">
                        <strong>主线中配</strong>
                        <span>控制主线故事中文配音</span>
                    </div>
                    <mdui-chip id="voice-status" class="feature-status" variant="assist" elevated>
                        <span class="status-content">
                            <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/status-loading.svg');-webkit-mask-image:url('assets/icons/status-loading.svg');"></span>
                            <span class="status-label">加载中</span>
                        </span>
                    </mdui-chip>
                    <mdui-switch id="voice-checkbox"></mdui-switch>
                </div>

                <div class="feature-item">
                    <div class="feature-title">
                        <strong>图像视频</strong>
                        <span>控制媒体资源汉化开关</span>
                    </div>
                    <mdui-chip id="media-status" class="feature-status" variant="assist" elevated>
                        <span class="status-content">
                            <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/status-loading.svg');-webkit-mask-image:url('assets/icons/status-loading.svg');"></span>
                            <span class="status-label">加载中</span>
                        </span>
                    </mdui-chip>
                    <mdui-switch id="media-checkbox"></mdui-switch>
                </div>
            </div>
        </section>

        <div class="actions">
            <mdui-button id="save-button" variant="filled">
                <span class="action-content">
                    <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/action-save.svg');-webkit-mask-image:url('assets/icons/action-save.svg');"></span>
                    <span>保存设置</span>
                </span>
            </mdui-button>
            <mdui-button id="read-button" variant="tonal">
                <span class="action-content">
                    <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/action-help.svg');-webkit-mask-image:url('assets/icons/action-help.svg');"></span>
                    <span>查看说明</span>
                </span>
            </mdui-button>
            <mdui-button id="copy-button" variant="outlined">
                <span class="action-content">
                    <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/action-copy-link.svg');-webkit-mask-image:url('assets/icons/action-copy-link.svg');"></span>
                    <span>复制链接</span>
                </span>
            </mdui-button>
            <mdui-button id="diagnose-button" variant="outlined">
                <span class="action-content">
                    <span class="ui-icon" aria-hidden="true" style="mask-image:url('assets/icons/action-diagnose.svg');-webkit-mask-image:url('assets/icons/action-diagnose.svg');"></span>
                    <span>诊断信息</span>
                </span>
            </mdui-button>
        </div>

        <footer class="page-footer">
            Copyright &copy; 2026 蔚蓝咖啡厅. All rights reserved.<br />
            使用 MDUI 构建 | <span id="webui-version"></span> | Developer: roundRekt, KFACBT
        </footer>
    </div>

    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <script>
        const element = (id) => document.getElementById(id);
        const uid = new URLSearchParams(location.search).get("uid");
        const webuiVersion = "WebUI v1.1.5";
        const APP_CONFIG = {
            assets: {
                icons: {
                    actionSave: "assets/icons/action-save.svg",
                    actionHelp: "assets/icons/action-help.svg",
                    actionCopyLink: "assets/icons/action-copy-link.svg",
                    actionDiagnose: "assets/icons/action-diagnose.svg",
                    statusLoading: "assets/icons/status-loading.svg",
                    statusReady: "assets/icons/status-ready.svg",
                    statusUpdate: "assets/icons/status-update.svg",
                    statusError: "assets/icons/status-error.svg"
                }
            },
            urls: {
                apiBase: "https://api.bluearchive.cafe",
                shareBase: "https://dash.bluearchive.cafe"
            }
        };
        const API_ENDPOINTS = {
            statusList: `${APP_CONFIG.urls.apiBase}/status/list`,
            configGet: `${APP_CONFIG.urls.apiBase}/config/get`,
            configSet: `${APP_CONFIG.urls.apiBase}/config/set`
        };

        /*  让 MDUI 组件跟随系统深浅色 */
        mdui.setTheme("auto");

        /*  设置页面主题色  */
        mdui.setColorScheme("#1976D2");

        const statusStyles = {
            loading: { text: "加载中", icon: APP_CONFIG.assets.icons.statusLoading },
            ready: { text: "可用", icon: APP_CONFIG.assets.icons.statusReady },
            waiting: { text: "待更新", icon: APP_CONFIG.assets.icons.statusUpdate },
            failed: { text: "获取失败", icon: APP_CONFIG.assets.icons.statusError }
        };
        const resourceVersions = {
            text: null,
            voice: null,
            media: null
        };
        const hasUid = typeof uid === "string" && uid.trim() !== "";

        const toggleInteractiveState = (disabled) => {
            ["text-checkbox", "voice-checkbox", "media-checkbox", "save-button", "copy-button"].forEach((id) => {
                element(id).disabled = disabled;
            });
        };

        const setStatus = (id, state) => {
            const chip = element(id);
            const style = statusStyles[state];
            chip.querySelector(".status-label").textContent = style.text;
            chip.querySelector(".ui-icon").style.maskImage = `url('${style.icon}')`;
            chip.querySelector(".ui-icon").style.webkitMaskImage = `url('${style.icon}')`;
        };

        const showTextDialog = ({ headline, lines, confirmText }) => {
            const dialog = document.createElement("mdui-dialog");

            const headlineElement = document.createElement("div");
            headlineElement.slot = "headline";
            headlineElement.textContent = headline;

            const descriptionElement = document.createElement("div");
            descriptionElement.slot = "description";
            descriptionElement.style.whiteSpace = "pre-line";
            descriptionElement.textContent = lines.join("\n");

            const actionElement = document.createElement("mdui-button");
            actionElement.slot = "action";
            actionElement.variant = "tonal";
            actionElement.textContent = confirmText;
            actionElement.addEventListener("click", () => {
                dialog.open = false;
            });

            dialog.append(headlineElement, descriptionElement, actionElement);
            dialog.addEventListener("closed", () => dialog.remove(), { once: true });
            document.body.append(dialog);
            dialog.open = true;
        };

        const fallbackCopyText = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.setAttribute("readonly", "");
            textArea.style.position = "fixed";
            textArea.style.top = "-9999px";
            textArea.style.opacity = "0";
            document.body.append(textArea);
            textArea.focus();
            textArea.select();

            let copied = false;
            try {
                copied = document.execCommand("copy");
            } finally {
                textArea.remove();
            }

            return copied;
        };

        const copyText = async (text) => {
            if (navigator.clipboard?.writeText) {
                try {
                    await navigator.clipboard.writeText(text);
                    return true;
                } catch {
                    return fallbackCopyText(text);
                }
            }

            return fallbackCopyText(text);
        };

        const showHelp = () => {
            showTextDialog({
                headline: "操作说明",
                lines: [
                    "1. 先确认各项状态，再决定是否开启对应功能",
                    "2. 只有状态为“可用”时，功能才能正常生效",
                    "3. 主线中配仅对主线剧情内容生效",
                    "4. 开启“图像视频”后，可能需要重新下载相关资源"
                ],
                confirmText: "知道了"
            });
        };

        const getBrowserEngineVersion = () => {
            const { userAgent } = navigator;
            const edge = userAgent.match(/Edg\/([\d.]+)/);
            if (edge) return `Chromium ${edge[1]} (Edge)`;

            const chrome = userAgent.match(/Chrome\/([\d.]+)/);
            if (chrome) return `Chromium ${chrome[1]}`;

            const firefox = userAgent.match(/Firefox\/([\d.]+)/);
            if (firefox) return `Gecko ${firefox[1]} (Firefox)`;

            const safari = userAgent.match(/Version\/([\d.]+).*Safari/);
            if (safari) return `WebKit ${safari[1]} (Safari)`;

            return "无法识别";
        };

        const getDiagnosticsLines = () => {
            const { userAgent, appVersion, platform, language, languages, onLine, cookieEnabled, hardwareConcurrency, deviceMemory } = navigator;
            const viewport = `${window.innerWidth} x ${window.innerHeight}`;
            const screenSize = `${window.screen.width} x ${window.screen.height}`;
            const formatVersionLine = (label, versionInfo) => {
                if (!versionInfo) return `${label}: 暂无数据`;
                return `${label}: \n * 官方: ${versionInfo.official} \n * 汉化: ${versionInfo.localized}`;
            };

            return [
                `浏览器内核: ${getBrowserEngineVersion()}`,
                `User-Agent: ${userAgent}`,
                `App Version: ${appVersion}`,
                `平台: ${platform || "未知"}`,
                `语言: ${language || "未知"}`,
                `语言列表: ${Array.isArray(languages) && languages.length ? languages.join(", ") : "未知"}`,
                `在线状态: ${onLine ? "在线" : "离线"}`,
                `Cookie: ${cookieEnabled ? "已启用" : "已禁用"}`,
                `视口尺寸: ${viewport}`,
                `屏幕尺寸: ${screenSize}`,
                `设备像素比: ${window.devicePixelRatio || 1}`,
                `控制面板 UID: ${hasUid ? uid : "未提供"}`,
                `当前地址: ${location.href}`,
                formatVersionLine("文本资源版本", resourceVersions.text),
                formatVersionLine("语音资源版本", resourceVersions.voice),
                formatVersionLine("媒体资源版本", resourceVersions.media)
            ];
        };

        element("read-button").addEventListener("click", showHelp);
        element("webui-version").textContent = webuiVersion;

        element("copy-button").addEventListener("click", async () => {
            if (!hasUid) {
                showTextDialog({
                    headline: "缺少参数",
                    lines: [
                        "当前链接缺少有效的 UID 参数",
                        "暂时无法生成分享链接",
                        "请使用包含 uid 的完整地址重新打开页面"
                    ],
                    confirmText: "关闭"
                });
                return;
            }

            const shareUrl = `${APP_CONFIG.urls.shareBase}?uid=${uid}`;
            const copied = await copyText(shareUrl);

            showTextDialog({
                headline: copied ? "复制成功" : "复制失败",
                lines: copied
                    ? [
                        `UID: ${uid}`,
                        "控制面板链接已复制到剪贴板",
                        "可粘贴到浏览器中打开",
                        "请妥善保管，避免被他人修改设置"
                    ]
                    : [
                        "当前浏览器无法自动写入剪贴板",
                        "请手动复制下面的链接并在浏览器中打开",
                        shareUrl
                    ],
                confirmText: "关闭"
            });
        });

        element("diagnose-button").addEventListener("click", () => {
            showTextDialog({
                headline: "诊断信息",
                lines: getDiagnosticsLines(),
                confirmText: "关闭"
            });
        });

        element("save-button").addEventListener("click", async () => {
            if (!hasUid) {
                showTextDialog({
                    headline: "无法保存",
                    lines: [
                        "当前链接缺少有效的 UID 参数",
                        "无法确认要保存到哪个账号",
                        "请通过正确的控制面板链接重新进入"
                    ],
                    confirmText: "关闭"
                });
                return;
            }

            const text = element("text-checkbox").checked ? "cn" : "jp";
            const voice = element("voice-checkbox").checked ? "cn" : "jp";
            const media = element("media-checkbox").checked ? "cn" : "jp";
            const params = new URLSearchParams({ uid, text, voice, media });
            const response = await fetch(`${API_ENDPOINTS.configSet}?${params}`);

            if (response.ok) {
                mdui.snackbar({
                    message: "设置已保存，重启游戏后生效",
                    closeable: true
                });
            } else {
                mdui.snackbar({
                    message: "保存失败，请稍后重试",
                    closeable: true
                });
            }
        });

        const init = async () => {
            if (!hasUid) {
                toggleInteractiveState(true);
                setStatus("text-status", "failed");
                setStatus("voice-status", "failed");
                setStatus("media-status", "failed");
                showTextDialog({
                    headline: "链接无效",
                    lines: [
                        "当前页面缺少必要的 UID 参数",
                        "暂时无法读取或保存资源开关配置",
                        "请从有效的控制面板链接重新打开页面"
                    ],
                    confirmText: "知道了"
                });
                return;
            }

            const [statusRes, configRes] = await Promise.all([
                fetch(API_ENDPOINTS.statusList),
                fetch(`${API_ENDPOINTS.configGet}?uid=${uid}`)
            ]);

            if (statusRes.ok) {
                const status = await statusRes.json();
                resourceVersions.text = {
                    official: status.text.official.version,
                    localized: status.text.localized.version
                };
                resourceVersions.voice = {
                    official: status.voice.official.version,
                    localized: status.voice.localized.version
                };
                resourceVersions.media = {
                    official: status.media.official.version,
                    localized: status.media.localized.version
                };
                const textSynced = status.text.official.version === status.text.localized.version;
                const voiceSynced = status.voice.official.version === status.voice.localized.version;
                const mediaSynced = status.media.official.version === status.media.localized.version;
                setStatus("text-status", textSynced ? "ready" : "waiting");
                setStatus("voice-status", voiceSynced ? "ready" : "waiting");
                setStatus("media-status", mediaSynced ? "ready" : "waiting");
            } else {
                setStatus("text-status", "failed");
                setStatus("voice-status", "failed");
                setStatus("media-status", "failed");
            }

            if (configRes.ok) {
                const { text, voice, media } = await configRes.json();
                element("text-checkbox").checked = text === "cn";
                element("voice-checkbox").checked = voice === "cn";
                element("media-checkbox").checked = media === "cn";
            }
        };

        init().catch(() => {
            setStatus("text-status", "failed");
            setStatus("voice-status", "failed");
            setStatus("media-status", "failed");
        });
    </script>
</body>

</html>
